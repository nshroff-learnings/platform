apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Service
metadata:
  name: sample-api
  namespace: microservices
spec:
  selector:
    app: sample-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: sample-api
  namespace: microservices
spec:
  replicas: 4
  selector:
    matchLabels:
      app: sample-api
  strategy:
    canary:
      canaryService: sample-api-canary
      stableService: sample-api
      trafficRouting:
        istio:
          virtualService:
            name: sample-api
            routes:
              - primary
      steps:
        - setWeight: 10
        - pause:
            duration: 5m
        - setWeight: 50
        - pause:
            duration: 10m
  template:
    metadata:
      labels:
        app: sample-api
    spec:
      containers:
        - name: sample-api
          image: public.ecr.aws/nginx/nginx:1.27
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: sample-api-canary
  namespace: microservices
spec:
  selector:
    app: sample-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: sample-api
  namespace: microservices
spec:
  hosts:
    - sample-api.example.com
  gateways:
    - istio-ingress/sample-gateway
  http:
    - name: primary
      route:
        - destination:
            host: sample-api
            port:
              number: 80
          weight: 100
        - destination:
            host: sample-api-canary
            port:
              number: 80
          weight: 0


