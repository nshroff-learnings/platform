apiVersion: platform.example.com/v1alpha1
kind: PlatformStack
metadata:
  name: dev-platform
  namespace: default
spec:
  parameters:
    targetClusterName: eks-dev-01
    targetClusterSecretName: eks-dev-01-kubeconfig
    targetClusterSecretNamespace: crossplane-system
    providerConfigName: eks-dev-01
    addons:
      argocd:
        enabled: true
        chartVersion: 8.1.3
        namespace: argocd
        domain: argocd.dev.example.com
        replicas: 2
      argoRollouts:
        enabled: true
        chartVersion: 2.40.0
        namespace: argo-rollouts
      istio:
        enabled: true
        chartVersion: 1.30.1
        namespace: istio-system
        ingressGatewayNamespace: istio-ingress
      kyverno:
        enabled: true
        chartVersion: 3.5.1
        namespace: kyverno
        admissionControllerReplicas: 2
      twistlock:
        enabled: false
        namespace: twistlock
        chartRepository: https://REPLACE_WITH_PRISMA_HELM_REPO
        chartName: twistlock-defender
        chartVersion: REPLACE_WITH_TESTED_CHART_VERSION
        consoleAddress: https://REPLACE_WITH_PRISMA_CONSOLE
      calico:
        enabled: true
        installOperator: true
        operatorChartVersion: v3.30.0
        operatorNamespace: tigera-operator
        protectedNamespaces:
          - default
          - microservices



