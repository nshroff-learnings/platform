apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xplatformstacks.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: XPlatformStack
    plural: xplatformstacks
  claimNames:
    kind: PlatformStack
    plural: platformstacks
  defaultCompositionRef:
    name: eks-addons-platform-stack
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - parameters
              properties:
                parameters:
                  type: object
                  required:
                    - targetClusterName
                    - targetClusterSecretName
                  properties:
                    targetClusterName:
                      type: string
                    targetClusterSecretName:
                      type: string
                    targetClusterSecretNamespace:
                      type: string
                      default: crossplane-system
                    providerConfigName:
                      type: string
                    addons:
                      type: object
                      properties:
                        argocd:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            chartVersion:
                              type: string
                              default: 8.1.3
                            namespace:
                              type: string
                              default: argocd
                            domain:
                              type: string
                              default: argocd.example.com
                            replicas:
                              type: integer
                              default: 2
                        argoRollouts:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            chartVersion:
                              type: string
                              default: 2.40.0
                            namespace:
                              type: string
                              default: argo-rollouts
                        istio:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            chartVersion:
                              type: string
                              default: 1.30.1
                            namespace:
                              type: string
                              default: istio-system
                            ingressGatewayNamespace:
                              type: string
                              default: istio-ingress
                        kyverno:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            chartVersion:
                              type: string
                              default: 3.5.1
                            namespace:
                              type: string
                              default: kyverno
                            admissionControllerReplicas:
                              type: integer
                              default: 2
                        twistlock:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: false
                            namespace:
                              type: string
                              default: twistlock
                            chartRepository:
                              type: string
                              default: https://REPLACE_WITH_PRISMA_HELM_REPO
                            chartName:
                              type: string
                              default: twistlock-defender
                            chartVersion:
                              type: string
                              default: REPLACE_WITH_TESTED_CHART_VERSION
                            consoleAddress:
                              type: string
                              default: https://REPLACE_WITH_PRISMA_CONSOLE
                        calico:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            installOperator:
                              type: boolean
                              default: true
                            operatorChartVersion:
                              type: string
                              default: v3.30.0
                            operatorNamespace:
                              type: string
                              default: tigera-operator
                            protectedNamespaces:
                              type: array
                              default:
                                - default
                              items:
                                type: string
            status:
              type: object
              properties:
                observed:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true



